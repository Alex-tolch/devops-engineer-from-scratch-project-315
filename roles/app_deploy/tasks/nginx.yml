---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Ensure Nginx proxy cache directory exists
  ansible.builtin.file:
    path: /var/cache/nginx/app
    state: directory
    owner: www-data
    group: www-data
    mode: "0750"

- name: Install prerequisites for Certbot PPA on Ubuntu
  ansible.builtin.apt:
    name: software-properties-common
    state: present
  when:
    - app_tls_enabled | bool
    - app_certbot_use_ppa_on_ubuntu | bool
    - ansible_distribution == "Ubuntu"

- name: Add Certbot PPA on Ubuntu (newer Certbot fixes Py3.11+ AttributeError bug)
  ansible.builtin.apt_repository:
    repo: ppa:certbot/certbot
    state: present
    update_cache: true
  when:
    - app_tls_enabled | bool
    - app_certbot_use_ppa_on_ubuntu | bool
    - ansible_distribution == "Ubuntu"

- name: Install latest Certbot
  ansible.builtin.apt:
    name: certbot
    state: latest
    update_cache: true
  when: app_tls_enabled | bool

- name: Ensure ACME webroot and challenge directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: www-data
    mode: "0755"
  loop:
    - "{{ app_tls_webroot }}"
    - "{{ app_tls_webroot }}/.well-known"
    - "{{ app_tls_webroot }}/.well-known/acme-challenge"
  when: app_tls_enabled | bool

- name: Check current TLS certificate files
  ansible.builtin.stat:
    path: "{{ item }}"
  register: app_tls_cert_stat
  loop:
    - "{{ app_tls_cert_path }}"
    - "{{ app_tls_key_path }}"
  when: app_tls_enabled | bool

- name: Mark TLS readiness from existing cert files
  ansible.builtin.set_fact:
    app_tls_cert_files_present: "{{ (app_tls_cert_stat.results | map(attribute='stat.exists') | list | min) | default(false) }}"
  when: app_tls_enabled | bool

- name: Mark TLS readiness disabled when TLS is off
  ansible.builtin.set_fact:
    app_tls_cert_files_present: false
  when: not (app_tls_enabled | bool)

- name: Deploy Nginx proxy_cache_path snippet
  ansible.builtin.template:
    src: nginx-proxy-cache.conf.j2
    dest: /etc/nginx/conf.d/00-app-proxy-cache.conf
    mode: "0644"
  notify: Reload nginx

- name: Deploy Nginx WebSocket upgrade map
  ansible.builtin.template:
    src: nginx-map-upgrade.conf.j2
    dest: /etc/nginx/conf.d/01-app-upgrade-map.conf
    mode: "0644"
  notify: Reload nginx

- name: Deploy Nginx site for application
  ansible.builtin.template:
    src: nginx-site.conf.j2
    dest: "/etc/nginx/sites-available/{{ app_nginx_site_name }}.conf"
    mode: "0644"
  notify: Reload nginx

- name: Disable default Nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Enable application Nginx site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ app_nginx_site_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ app_nginx_site_name }}.conf"
    state: link
    force: true
  notify: Reload nginx

- name: Validate Nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Ensure Nginx is enabled and running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Reload Nginx so ACME webroot is active before certbot
  ansible.builtin.meta: flush_handlers
  when: app_tls_enabled | bool

- name: Reload Nginx before Let's Encrypt validation
  ansible.builtin.service:
    name: nginx
    state: reloaded
  when:
    - app_tls_enabled | bool
    - not (app_tls_cert_files_present | bool)

- name: Assert domain is set when TLS is enabled
  ansible.builtin.assert:
    that:
      - app_tls_domain | default('') | length > 0
    fail_msg: Set app_tls_domain in inventory when app_tls_enabled is true.
  when: app_tls_enabled | bool

- name: Build certbot email args
  ansible.builtin.set_fact:
    app_certbot_email_args: >-
      {{
        ['--email', app_tls_email]
        if (app_tls_email | default('') | length > 0)
        else
        ['--register-unsafely-without-email']
      }}
  when: app_tls_enabled | bool

- name: Request/renew Let's Encrypt certificate (webroot)
  ansible.builtin.command:
    argv: >-
      {{
        [
          app_certbot_binary, 'certonly',
          '--webroot',
          '--webroot-path', app_tls_webroot,
          '--domain', app_tls_domain,
          '--non-interactive',
          '--agree-tos',
          '--keep-until-expiring'
        ] + app_certbot_email_args
      }}
  changed_when: true
  when:
    - app_tls_enabled | bool
    - not (app_tls_cert_files_present | bool)

- name: Re-check TLS certificate files after certbot
  ansible.builtin.stat:
    path: "{{ item }}"
  register: app_tls_cert_stat_after
  loop:
    - "{{ app_tls_cert_path }}"
    - "{{ app_tls_key_path }}"
  when: app_tls_enabled | bool

- name: Mark TLS readiness after certbot
  ansible.builtin.set_fact:
    app_tls_cert_files_present: "{{ (app_tls_cert_stat_after.results | map(attribute='stat.exists') | list | min) | default(false) }}"
  when: app_tls_enabled | bool

- name: Install certbot deploy hook for Nginx reload
  ansible.builtin.copy:
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
    mode: "0755"
    content: |
      #!/bin/sh
      set -eu
      systemctl reload nginx
  when: app_tls_enabled | bool

- name: Ensure certbot timer is enabled and running
  ansible.builtin.service:
    name: certbot.timer
    state: started
    enabled: true
  when: app_tls_enabled | bool

- name: Re-deploy Nginx site for final HTTP/HTTPS mode
  ansible.builtin.template:
    src: nginx-site.conf.j2
    dest: "/etc/nginx/sites-available/{{ app_nginx_site_name }}.conf"
    mode: "0644"
  notify: Reload nginx

- name: Validate Nginx configuration after TLS changes
  ansible.builtin.command: nginx -t
  changed_when: false
